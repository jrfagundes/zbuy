<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ZBuy Static Wireframes</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar" aria-label="Prototype screens">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">Z</span>
          <div>
            <strong>ZBuy</strong>
            <span>static wireframes</span>
          </div>
        </div>
        <nav id="nav" class="nav"></nav>
      </aside>

      <main class="content">
        <header class="topbar">
          <div>
            <p class="eyebrow">Prototype documentation</p>
            <h1 id="screen-title">Home</h1>
          </div>
          <div class="status-pill">No backend / no dependencies</div>
        </header>
        <section id="app" class="screen" aria-live="polite"></section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
